<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error - 500</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f7f9fc;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 500px;
            padding: 40px 20px;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 800;
            color: #dc2626; /* Red tone to indicate a server issue */
            line-height: 1;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 15px;
            color: #1f2937;
        }

        p {
            font-size: 1.1rem;
            color: #6b7280;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .btn {
            display: inline-block;
            background-color: #1f2937;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 600;
            transition: background-color 0.2s ease;
        }

        .btn:hover {
            background-color: #374151;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="error-code">500</div>
        <h1>Internal Server Error</h1>
        <p>Something went wrong on our end. We are looking into it right now. Please try refreshing the page or check back later.</p>
        <a href="/" class="btn">Reload Homepage</a>
    </div>

</body>
</html>
