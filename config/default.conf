# Commentaire (ligne ignorée si elle commence par #)

server {
    listen              127.0.0.1:8080;
    listen              8081;                      # host par défaut 0.0.0.0
    server_name         localhost example.com;

    client_max_body_size 1K;                      # suffixes K / M / G

    error_page          404 /errors/404.html;
    error_page          500 502 503 504 /errors/50x.html;

    root                /home/lmilando/webserv/site;
    index               index.html index.htm;
	autoindex	on;

    location / {
        allow_methods   GET;                  # défaut: GET seul
        autoindex       off;
    }

    location /upload {
        allow_methods   POST DELETE;
        upload_store    /home/lmilando/webserv/site/upload;
        client_max_body_size 1K;                  # override le server
    }

    location /dir {
        root /home/lmilando;
    }

    location /old {
        return          301 /new;                  # redirection
    }

    location /cgi-bin {
        allow_methods   GET POST;
        cgi_pass        .py /usr/bin/python3;       # extension -> interpréteur
        cgi_pass        .php /usr/bin/php-cgi;
    }
}

server {
    listen              8083;
    server_name         other.com;
    root                /home/lmilando/webserv/site2;
	autoindex		on;
	location / {
		allow_methods GET POST DELETE;
		upload_store /home/lmilando/webserv/site2/;
	}
}
