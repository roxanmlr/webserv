server {
    listen              0.0.0.0:80;

    listen              0.0.0.0:8080;
    listen              8081;

    server_name         211.15.23.17 fake.test example.com localhost;

    client_max_body_size 10M;

    error_page          404 /errors/404.html;
    error_page          500 502 503 /errors/50x.html;

    root                /var/www/html;
    index               index.html index.htm;

    location / {
        allow_methods   GET POST;
        autoindex       off;
    }

    location /upload {
        allow_methods   POST DELETE;
        upload_store    /var/www/uploads;
        client_max_body_size 50M;
    }

    location /old {
        return          301 /new;
    }

    location /php {
        allow_methods   GET POST;
        fastcgi_pass    127.0.0.1:9000;
        fastcgi_param   SCRIPT_FILENAME  /somewhere;
        fastcgi_param   QUERY_STRING     query_string;
    }

    location /cgi-bin {
        allow_methods   GET POST;
        cgi_pass        .py /usr/bin/python3;
        cgi_pass        .php /usr/bin/php-cgi;
    }
}

server {
    listen              0.0.0.0:8083;
    server_name         211.20.30.40 other.com;

    root                /var/www/other;
    index               index.html;
}